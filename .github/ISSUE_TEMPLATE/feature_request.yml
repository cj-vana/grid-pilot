name: Feature request
description: An action, mapping, or module GridPilot should support
labels: [enhancement]
body:
  - type: textarea
    id: idea
    attributes:
      label: The idea
      description: What should a control do, or what module should work?
    validations:
      required: true
  - type: textarea
    id: workaround
    attributes:
      label: Can you do it today with a shell/applescript action?
      description: >
        Many things work right now via the generic actions or `gridpilot ai`.
        If you tried and it wasn't enough, say what was missing.
